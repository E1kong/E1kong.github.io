<style>
        :root {
            --neon-green: #00ff87;
            --accent-gold: #f5a623;
            --bg-deep: #050508;
            --bg-glow: #0a1a10;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-deep) 100%);
            overflow: hidden;
            color: white;
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.15;
        }

        /* Black Hole Animations */
        @keyframes rotate-outer {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.1); }
        }

        .black-hole-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .halo {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(0, 255, 135, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .ring-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-green);
            border-right: 2px solid var(--neon-green);
            border-radius: 50%;
            animation: rotate-outer 10s linear infinite;
        }

        .ring-middle {
            position: absolute;
            width: 80%;
            height: 80%;
            background: conic-gradient(from 180deg at 50% 50%, #4a148c, #008080, #4a148c);
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.8;
            animation: rotate-outer 15s linear infinite reverse;
        }

        .ring-inner {
            position: absolute;
            width: 50%;
            height: 50%;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 40px 10px rgba(0,0,0,1);
            z-index: 10;
        }

        /* Glitch Effect on Hover */
        .glitch:hover {
            animation: glitch-anim 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .glow-sm {
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.5);
        }
    </style>

<canvas class="fixed inset-0 pointer-events-none z-0" id="particleCanvas"></canvas>
<script>
        // Simple ambient particle effect for depth
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    speed: Math.random() * 0.5 + 0.1,
                    opacity: Math.random() * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < -10) p.y = canvas.height + 10;
                ctx.fillStyle = `rgba(0, 255, 135, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
